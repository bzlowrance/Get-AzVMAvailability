name: "PowerShell Linting"

on:
    push:
        branches: ["main"]
    pull_request:
        branches: ["main"]
    workflow_dispatch: # Allow manual trigger for baseline scans

permissions:
    contents: read
    security-events: write # Required for SARIF upload to code scanning

jobs:
    lint:
        name: PSScriptAnalyzer
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.2.2

            - name: Run PSScriptAnalyzer
              uses: microsoft/psscriptanalyzer-action@v1.1
              with:
                  path: .
                  recurse: true
                  output: results.sarif
                  settings: ./PSScriptAnalyzerSettings.psd1

            - name: Upload SARIF results
              uses: github/codeql-action/upload-sarif@v3
              with:
                  sarif_file: results.sarif
              if: always()

    test:
        name: Pester Tests (${{ matrix.os }})
        runs-on: ${{ matrix.os }}
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-latest, windows-latest]
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.2.2

            - name: Install test dependencies
              shell: pwsh
              run: |
                  Set-PSRepository PSGallery -InstallationPolicy Trusted
                  Install-Module -Name Pester -Force -SkipPublisherCheck -MinimumVersion 5.0.0
                  Install-Module -Name Az.Accounts -Force -SkipPublisherCheck -MinimumVersion 2.0.0
                  Install-Module -Name Az.Compute -Force -SkipPublisherCheck -MinimumVersion 4.0.0
                  Install-Module -Name Az.Resources -Force -SkipPublisherCheck -MinimumVersion 4.0.0

            - name: Run Pester Tests
              shell: pwsh
              run: |
                  $unitTests = Get-ChildItem ./tests/*.Tests.ps1 | Where-Object Name -ne 'Integration.Tests.ps1'
                  $config = New-PesterConfiguration
                  $config.Run.Path = $unitTests.FullName
                  $config.Run.PassThru = $true
                  $config.Output.Verbosity = 'Detailed'
                  $config.TestResult.Enabled = $true
                  $config.TestResult.OutputFormat = 'NUnitXml'
                  $config.TestResult.OutputPath = "./artifacts/pester-${{ matrix.os }}.xml"
                  $config.CodeCoverage.Enabled = $true
                  $config.CodeCoverage.Path = @(
                      './AzVMAvailability/Public/*.ps1',
                      './AzVMAvailability/Private/**/*.ps1'
                  )
                  $config.CodeCoverage.OutputFormat = 'JaCoCo'
                  $config.CodeCoverage.OutputPath = "./artifacts/coverage-${{ matrix.os }}.xml"
                  New-Item -ItemType Directory -Force -Path ./artifacts | Out-Null
                  $results = Invoke-Pester -Configuration $config
                  if ($results.FailedCount -gt 0) {
                    throw "$($results.FailedCount) test(s) failed"
                  }

            - name: Upload test results
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: pester-results-${{ matrix.os }}
                  path: ./artifacts/pester-${{ matrix.os }}.xml

            - name: Upload coverage
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: coverage-${{ matrix.os }}
                  path: ./artifacts/coverage-${{ matrix.os }}.xml

            - name: Upload module artifact
              if: matrix.os == 'ubuntu-latest'
              uses: actions/upload-artifact@v4
              with:
                  name: AzVMAvailability-module
                  path: AzVMAvailability/

    audit:
        name: Repo Self-Audit
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v4.2.2

            - name: Install PSScriptAnalyzer
              shell: pwsh
              run: Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck

            - name: Run repo self-audit gate
              shell: pwsh
              run: |
                  ./tools/Invoke-RepoSelfAudit.ps1 `
                    -RepoRoot . `
                    -PrimaryScript Get-AzVMAvailability.ps1 `
                    -FailOnCritical `
                    -MaxAllowedCritical 2

            - name: Upload audit report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: audit-report
                  path: artifacts/audit/
